openapi: 3.0.3
info:
  title: LFramework API
  description: API dos microserviços Identity e Catalog (acessíveis via API Gateway em /identity/ e /catalog/).
  version: 1.0.0

servers:
  - url: http://localhost:8080/identity
    description: API Gateway (Identity)
  - url: http://localhost:8080/catalog
    description: API Gateway (Catalog)
  - url: http://localhost:3001
    description: Identity Service direto
  - url: http://localhost:3002
    description: Catalog Service direto

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Mensagem de erro

    # Identity - Auth
    RegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password: { type: string, format: password }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    AuthResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: string }
            email: { type: string }
            name: { type: string }
            createdAt: { type: string }
        accessToken: { type: string }
        expiresIn: { type: string }

    # Identity - Users
    CreateUserRequest:
      type: object
      required: [email, name]
      properties:
        email: { type: string, format: email }
        name: { type: string }
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        createdAt: { type: string }

    # Catalog - Items
    CreateItemRequest:
      type: object
      required: [name, priceAmount]
      properties:
        name: { type: string }
        priceAmount: { type: number, minimum: 0 }
        priceCurrency: { type: string, default: "BRL", maxLength: 3 }
    Item:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        priceAmount: { type: number }
        priceCurrency: { type: string }
        createdAt: { type: string }

paths:
  # --- Identity: Auth ---
  /api/auth/register:
    post:
      summary: Registrar novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201": { description: Usuário criado e autenticado }
        "400": { description: Dados inválidos; schema de erro aplicável }
        "409": { description: Email já existe }
        "429": { description: Rate limit excedido }
        "500": { schema: { $ref: "#/components/schemas/Error" } }

  /api/auth/login:
    post:
      summary: Login (email/senha)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200": { description: OK; retorna user + accessToken + expiresIn }
        "401": { schema: { $ref: "#/components/schemas/Error" } }
        "429": { description: Rate limit excedido }
        "500": { schema: { $ref: "#/components/schemas/Error" } }

  /api/auth/me:
    get:
      summary: Usuário atual (Bearer JWT)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK; dados do usuário }
        "401": { schema: { $ref: "#/components/schemas/Error" } }
        "500": { schema: { $ref: "#/components/schemas/Error" } }

  # --- Identity: Users (admin / próprio usuário) ---
  /api/users:
    post:
      summary: Criar usuário (admin; Bearer JWT)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201": { description: Usuário criado }
        "400": { schema: { $ref: "#/components/schemas/Error" } }
        "401": { schema: { $ref: "#/components/schemas/Error" } }
        "403": { schema: { $ref: "#/components/schemas/Error" } }
        "409": { schema: { $ref: "#/components/schemas/Error" } }
        "500": { schema: { $ref: "#/components/schemas/Error" } }

  /api/users/{id}:
    get:
      summary: Buscar usuário por ID (Bearer JWT; próprio usuário ou admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: OK; objeto usuário }
        "400": { description: ID inválido }
        "401": { schema: { $ref: "#/components/schemas/Error" } }
        "403": { schema: { $ref: "#/components/schemas/Error" } }
        "404": { schema: { $ref: "#/components/schemas/Error" } }
        "500": { schema: { $ref: "#/components/schemas/Error" } }

  # --- Catalog: Items ---
  /api/items:
    get:
      summary: Listar itens (público)
      responses:
        "200": { description: OK; array de itens }
        "500": { schema: { $ref: "#/components/schemas/Error" } }
    post:
      summary: Criar item (Bearer JWT)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateItemRequest" }
      responses:
        "201": { description: Item criado }
        "400": { schema: { $ref: "#/components/schemas/Error" } }
        "401": { schema: { $ref: "#/components/schemas/Error" } }
        "500": { schema: { $ref: "#/components/schemas/Error" } }

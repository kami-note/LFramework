events {
    worker_connections 1024;
}

http {
    upstream identity {
        # Serviços rodando no host (pnpm run dev) ou host.docker.internal em Linux
        server host.docker.internal:3001;
    }

    upstream catalog {
        server host.docker.internal:3002;
    }

    server {
        listen 80;
        server_name localhost;

        # Identity Service: /identity/api/* e /identity/health
        location /identity/ {
            proxy_pass http://identity/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catalog Service: /catalog/api/* e /catalog/health
        location /catalog/ {
            proxy_pass http://catalog/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health do gateway
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"Not Found","message":"Use /identity/ or /catalog/"}';
            add_header Content-Type application/json;
        }
    }
}
